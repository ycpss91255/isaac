name: Unit Tests

# Per ADR-0011: Unit tests run on GitHub-hosted runners (free, no GPU
# required). Tests under test/unit/ are pure Python (pytest + pyyaml),
# no Isaac Sim dependency.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  unit-test:
    name: pytest test/unit/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Discover and report tests
        run: |
          set -euo pipefail
          if [ ! -d test/unit ]; then
            echo "no test/unit/ directory — skipping (will become required once test files land)"
            exit 0
          fi
          count=$(find test/unit -name 'test_*.py' | wc -l)
          echo "test/unit/ contains $count test files"

      - name: Run pytest
        run: |
          set -euo pipefail
          if [ ! -d test/unit ]; then
            echo "no test/unit/ directory — skip"
            exit 0
          fi
          python -m pytest test/unit/ -v --tb=short
